name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="terraform-provider-dexidp_1.0.0_${GOOS}_${GOARCH}${{ matrix.ext }}"
          go build -ldflags="-s -w -X main.version=1.0.0 -X main.commit=${{ github.sha }}" -o "$OUTPUT_NAME" .

      - name: Compute checksums
        run: |
          sha256sum terraform-provider-dexidp_1.0.0_* > terraform-provider-dexidp_1.0.0_SHA256SUMS

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files |
            terraform-provider-dexidp_1.0.0_*
            terraform-provider-dexidp_1.0.0_SHA256SUMS
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
