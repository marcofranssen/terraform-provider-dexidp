name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          OUTPUT_NAME="terraform-provider-dexidp_v1.0.0_${GOOS}_${GOARCH}${EXT}"
          go build -ldflags="-s -w -X main.version=v1.0.0 -X main.commit=${{ github.sha }}" -o "$OUTPUT_NAME" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.goos }}-${{ matrix.goarch }}
          path: terraform-provider-dexidp_v1.0.0_*

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: terraform-provider-dexidp_v1.0.0_*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
